name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate version format
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "error: version must be in semver format (e.g. 0.1.0)" >&2
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/$VERSION$"; then
            echo "error: tag $VERSION already exists" >&2
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

  build-macos:
    needs: preflight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.2
        run: sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer

      - name: Bump Version.swift (build-time only)
        run: |
          sed -i '' "s/static let current = \".*\"/static let current = \"$VERSION\"/" \
            Sources/GitNaggCLI/Version.swift
        env:
          VERSION: ${{ inputs.version }}

      - name: Build Universal Binary
        run: xcrun swift build -c release --arch arm64 --arch x86_64

      - name: Create Archive
        run: |
          cd .build/apple/Products/Release
          tar -czvf "gitnagg-${VERSION}-darwin-universal.tar.gz" gitnagg
          shasum -a 256 "gitnagg-${VERSION}-darwin-universal.tar.gz" > "gitnagg-${VERSION}-darwin-universal.tar.gz.sha256"
        env:
          VERSION: ${{ inputs.version }}

      - name: Upload release archive
        uses: actions/upload-artifact@v6
        with:
          name: gitnagg-darwin-universal
          path: |
            .build/apple/Products/Release/gitnagg-${{ inputs.version }}-darwin-universal.tar.gz
            .build/apple/Products/Release/gitnagg-${{ inputs.version }}-darwin-universal.tar.gz.sha256
          if-no-files-found: error

      - name: Upload binary for artifact bundle
        uses: actions/upload-artifact@v6
        with:
          name: binary-macos
          path: .build/apple/Products/Release/gitnagg
          if-no-files-found: error

  commit-version:
    needs: [build-macos]
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Bump Version.swift
        run: |
          sed -i "s/static let current = \".*\"/static let current = \"$VERSION\"/" \
            Sources/GitNaggCLI/Version.swift
        env:
          VERSION: ${{ inputs.version }}

      - name: Commit and push
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sources/GitNaggCLI/Version.swift
          if git diff --cached --quiet; then
            echo "Version.swift already at $VERSION, skipping commit"
          else
            git commit -m "chore: bump version to $VERSION"
            git push origin main
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ inputs.version }}

  create-release:
    needs: [commit-version, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.commit-version.outputs.commit_sha }}

      - name: Download all release archives
        uses: actions/download-artifact@v6
        with:
          pattern: gitnagg-*
          path: /tmp/release-assets
          merge-multiple: true

      - name: Download macOS binary for artifact bundle
        uses: actions/download-artifact@v6
        with:
          name: binary-macos
          path: /tmp/binaries/macos

      - name: Create Artifact Bundle
        run: |
          BUNDLE="gitnagg.artifactbundle"

          mkdir -p "$BUNDLE/gitnagg-macos/bin"

          cp /tmp/binaries/macos/gitnagg "$BUNDLE/gitnagg-macos/bin/gitnagg"
          chmod +x "$BUNDLE/gitnagg-macos/bin/gitnagg"

          cat > "$BUNDLE/info.json" <<EOF
          {
            "schemaVersion": "1.0",
            "artifacts": {
              "gitnagg": {
                "version": "${VERSION}",
                "type": "executable",
                "variants": [
                  {
                    "path": "gitnagg-macos/bin/gitnagg",
                    "supportedTriples": ["x86_64-apple-macosx", "arm64-apple-macosx"]
                  }
                ]
              }
            }
          }
          EOF

          zip -r "gitnagg-${VERSION}.artifactbundle.zip" "$BUNDLE"
          sha256sum "gitnagg-${VERSION}.artifactbundle.zip" > "gitnagg-${VERSION}.artifactbundle.zip.sha256"
        env:
          VERSION: ${{ inputs.version }}

      - name: Create GitHub Release with all assets
        run: |
          gh release create "$VERSION" \
            /tmp/release-assets/* \
            "gitnagg-${VERSION}.artifactbundle.zip" \
            "gitnagg-${VERSION}.artifactbundle.zip.sha256" \
            --target "$TARGET_SHA" \
            --title "$VERSION" \
            --generate-notes
        env:
          VERSION: ${{ inputs.version }}
          TARGET_SHA: ${{ needs.commit-version.outputs.commit_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
